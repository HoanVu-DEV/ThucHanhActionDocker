name: Build, Push and Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hoanvu2/demo-app:latest

      - name: Deploy to DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/demo-app"
          TAG="latest"
          CONTAINER_PORT=8080

          RESPONSE=$(curl -m 1200 -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=$TAG&slot=7&container_port=$CONTAINER_PORT&strict_container_port=0")

          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP Code: $CODE"

          echo "::group::Response JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy failed"
            exit 1
          fi

          echo "Deploy success"
